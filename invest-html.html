<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Інвестиційний портфель</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f9fafb;font-family:system-ui,sans-serif;color:#111}
  input,select{outline:none;font-family:inherit;font-size:14px}
  button{cursor:pointer;font-family:inherit}
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo}=React;
const {LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer}=Recharts;

const KEY="invest-pflio-v2";
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=(n,d=2)=>Number(n).toLocaleString("uk-UA",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtUSD=(n,d=0)=>"$"+fmt(n,d);

function App(){
  const [tab,setTab]=useState("portfolio");
  const [txns,setTxns]=useState(()=>{try{return JSON.parse(localStorage.getItem(KEY)||"[]")}catch{return[]}});

  const save=next=>{setTxns(next);localStorage.setItem(KEY,JSON.stringify(next))};

  const portfolio=useMemo(()=>{
    const map={};
    for(const t of txns){
      if(!map[t.assetId])map[t.assetId]={assetId:t.assetId,name:t.name,ticker:t.ticker,shares:0,totalCost:0,dividendYield:t.dividendYield,currentPrice:t.price};
      const s=t.type==="sell"?-1:1;
      map[t.assetId].shares+=s*t.qty;
      map[t.assetId].totalCost+=s*t.qty*t.price;
      map[t.assetId].dividendYield=t.dividendYield;
      map[t.assetId].currentPrice=t.price;
      map[t.assetId].name=t.name;
      map[t.assetId].ticker=t.ticker;
    }
    return Object.values(map).filter(a=>a.shares>0.00001);
  },[txns]);

  const tabs=[["portfolio","📂 Портфель"],["transactions","💳 Транзакції"],["forecast","📈 Прогноз"]];

  return(
    <div style={{minHeight:"100vh",background:"#f9fafb"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #f0f0f0",padding:"16px 16px 0",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{fontSize:20}}>📈</span>
            <span style={{fontWeight:600,fontSize:15}}>Інвестиційний портфель</span>
          </div>
          <div style={{display:"flex",gap:20}}>
            {tabs.map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",borderBottom:tab===k?"2px solid #3b82f6":"2px solid transparent",color:tab===k?"#3b82f6":"#9ca3af",fontWeight:tab===k?600:400,fontSize:13,paddingBottom:8,transition:"all .15s"}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"20px 16px"}}>
        {tab==="portfolio"&&<Portfolio portfolio={portfolio}/>}
        {tab==="transactions"&&<Transactions txns={txns} onSave={save} portfolio={portfolio}/>}
        {tab==="forecast"&&<Forecast portfolio={portfolio}/>}
      </div>
    </div>
  );
}

function Portfolio({portfolio}){
  const totalValue=portfolio.reduce((s,a)=>s+a.shares*a.currentPrice,0);
  const totalCost=portfolio.reduce((s,a)=>s+a.totalCost,0);
  const totalDiv=portfolio.reduce((s,a)=>s+a.shares*a.currentPrice*(a.dividendYield/100),0);
  const pnl=totalValue-totalCost;
  const pnlPct=totalCost>0?(pnl/totalCost)*100:0;

  if(!portfolio.length)return(
    <div style={{textAlign:"center",padding:"80px 0",color:"#9ca3af"}}>
      <div style={{fontSize:40,marginBottom:12}}>📂</div>
      <p style={{fontWeight:500,color:"#6b7280",marginBottom:4}}>Портфель порожній</p>
      <p style={{fontSize:13}}>Перейдіть до «Транзакції» та додайте перший актив</p>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Card>
          <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>Загальна вартість</div>
          <div style={{fontSize:20,fontWeight:700}}>{fmtUSD(totalValue)}</div>
          <div style={{fontSize:11,marginTop:4,fontWeight:500,color:pnl>=0?"#16a34a":"#ef4444"}}>
            {pnl>=0?"+":""}{fmtUSD(pnl)} ({pnl>=0?"+":""}{fmt(pnlPct,2)}%)
          </div>
        </Card>
        <Card>
          <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>Річні дивіденди</div>
          <div style={{fontSize:20,fontWeight:700}}>{fmtUSD(totalDiv)}</div>
          <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>{fmtUSD(totalDiv/12,2)}/міс</div>
        </Card>
      </div>
      <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0f0f0",overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #f9fafb"}}>
          <span style={{fontSize:11,color:"#9ca3af",textTransform:"uppercase",letterSpacing:1}}>Активи</span>
        </div>
        {portfolio.map(a=>{
          const val=a.shares*a.currentPrice;
          const div=val*(a.dividendYield/100);
          const w=totalValue>0?(val/totalValue)*100:0;
          const profit=val-a.totalCost;
          return(
            <div key={a.assetId} style={{padding:"12px 16px",borderBottom:"1px solid #f9fafb"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontWeight:500,fontSize:14}}>{a.name} <span style={{color:"#9ca3af",fontWeight:400,fontSize:12}}>({a.ticker})</span></div>
                  <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{fmt(a.shares,4)} шт · ${fmt(a.currentPrice)} · {a.dividendYield}%/рік</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:700,fontSize:14}}>{fmtUSD(val)}</div>
                  <div style={{fontSize:11,color:profit>=0?"#16a34a":"#ef4444",marginTop:2}}>{profit>=0?"+":""}{fmtUSD(profit)}</div>
                </div>
              </div>
              <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1,background:"#f3f4f6",borderRadius:99,height:4}}>
                  <div style={{background:"#3b82f6",height:4,borderRadius:99,width:`${Math.min(w,100)}%`}}/>
                </div>
                <span style={{fontSize:11,color:"#9ca3af"}}>{fmt(w,1)}%</span>
                <span style={{fontSize:11,color:"#16a34a",fontWeight:500}}>{fmtUSD(div)}/рік</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Transactions({txns,onSave,portfolio}){
  const [show,setShow]=useState(false);
  const [isNew,setIsNew]=useState(true);
  const [f,setF]=useState({name:"",ticker:"",qty:"",price:"",dividendYield:"",date:new Date().toISOString().slice(0,10),type:"buy",assetId:""});
  const set=k=>v=>setF(p=>({...p,[k]:v}));

  const selectAsset=v=>{
    if(v==="__new__"){setIsNew(true);setF(p=>({...p,assetId:"",name:"",ticker:"",dividendYield:""}))}
    else{const a=portfolio.find(a=>a.assetId===v);setIsNew(false);setF(p=>({...p,assetId:v,name:a.name,ticker:a.ticker,dividendYield:a.dividendYield}))}
  };

  const submit=()=>{
    if(!f.qty||!f.price||(isNew&&!f.name))return;
    const assetId=isNew?uid():f.assetId;
    onSave([...txns,{id:uid(),assetId,name:f.name,ticker:f.ticker.toUpperCase(),qty:parseFloat(f.qty),price:parseFloat(f.price),dividendYield:parseFloat(f.dividendYield)||0,date:f.date,type:f.type}]);
    setShow(false);setIsNew(true);
    setF(p=>({...p,qty:"",price:"",name:"",ticker:"",dividendYield:"",assetId:""}));
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,color:"#6b7280"}}>{txns.length} транзакцій</span>
        <button onClick={()=>setShow(!show)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:12,padding:"6px 14px",fontSize:13}}>+ Додати</button>
      </div>

      {show&&(
        <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0f0f0",padding:16,display:"flex",flexDirection:"column",gap:12}}>
          <p style={{fontWeight:500,fontSize:14}}>Нова транзакція</p>
          <div>
            <Label>Тип операції</Label>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              {[["buy","Купівля"],["sell","Продаж"]].map(([v,l])=>(
                <button key={v} onClick={()=>set("type")(v)} style={{flex:1,padding:"6px 0",borderRadius:12,border:`1px solid ${f.type===v?(v==="buy"?"#93c5fd":"#fca5a5"):"#e5e7eb"}`,background:f.type===v?(v==="buy"?"#eff6ff":"#fef2f2"):"#fff",color:f.type===v?(v==="buy"?"#1d4ed8":"#dc2626"):"#6b7280",fontSize:13}}>
                  {l}
                </button>
              ))}
            </div>
          </div>
          <div>
            <Label>Актив</Label>
            <select onChange={e=>selectAsset(e.target.value)} style={inputStyle}>
              <option value="__new__">+ Новий актив</option>
              {portfolio.map(a=><option key={a.assetId} value={a.assetId}>{a.name} ({a.ticker})</option>)}
            </select>
          </div>
          {isNew&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <FInput label="Назва" value={f.name} onChange={set("name")} placeholder="Apple Inc."/>
              <FInput label="Тікер" value={f.ticker} onChange={set("ticker")} placeholder="AAPL"/>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <FInput label="Кількість" value={f.qty} onChange={set("qty")} type="number" placeholder="10"/>
            <FInput label="Ціна ($)" value={f.price} onChange={set("price")} type="number" placeholder="175"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <FInput label="Дивіденди (%/рік)" value={f.dividendYield} onChange={set("dividendYield")} type="number" placeholder="1.5"/>
            <FInput label="Дата" value={f.date} onChange={set("date")} type="date"/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={submit} style={{flex:1,background:"#3b82f6",color:"#fff",border:"none",borderRadius:12,padding:"10px 0",fontSize:13,fontWeight:500}}>Зберегти</button>
            <button onClick={()=>setShow(false)} style={{padding:"10px 16px",fontSize:13,color:"#6b7280",border:"1px solid #e5e7eb",borderRadius:12,background:"#fff"}}>Скасувати</button>
          </div>
        </div>
      )}

      {txns.length===0?(
        <div style={{textAlign:"center",padding:"48px 0",color:"#9ca3af",fontSize:13}}>Транзакцій ще немає</div>
      ):(
        <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0f0f0",overflow:"hidden"}}>
          {[...txns].reverse().map(t=>(
            <div key={t.id} style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f9fafb"}}>
              <div>
                <div style={{fontSize:14,fontWeight:500}}>{t.name} <span style={{color:"#9ca3af",fontWeight:400,fontSize:12}}>({t.ticker})</span></div>
                <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{t.date} · {t.type==="buy"?"Купівля":"Продаж"} {fmt(t.qty,4)} шт по ${fmt(t.price)}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:14,fontWeight:600,color:t.type==="buy"?"#3b82f6":"#ef4444"}}>
                  {t.type==="buy"?"−":"+"}{fmtUSD(t.qty*t.price)}
                </span>
                <button onClick={()=>onSave(txns.filter(x=>x.id!==t.id))} style={{background:"none",border:"none",color:"#d1d5db",fontSize:14,padding:"0 4px"}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Forecast({portfolio}){
  const [cfg,setCfg]=useState({monthly:200,months:36,growth:7,usePortfolio:true,customYield:3,customPrice:100});
  const [result,setResult]=useState(null);
  const set=k=>v=>setCfg(p=>({...p,[k]:v}));

  const compute=()=>{
    const monthly=parseFloat(cfg.monthly)||0;
    const months=Math.min(parseInt(cfg.months)||12,360);
    const mGrowth=Math.pow(1+parseFloat(cfg.growth)/100,1/12)-1;
    const usePort=cfg.usePortfolio&&portfolio.length>0;

    let price=usePort
      ?portfolio.reduce((s,a)=>s+a.shares*a.currentPrice,0)/Math.max(portfolio.reduce((s,a)=>s+a.shares,0),0.0001)
      :parseFloat(cfg.customPrice)||100;
    const annualYield=usePort
      ?portfolio.reduce((s,a)=>s+(a.dividendYield/100)*a.shares*a.currentPrice,0)/Math.max(portfolio.reduce((s,a)=>s+a.shares*a.currentPrice,0),0.0001)
      :(parseFloat(cfg.customYield)||0)/100;

    let shares=usePort?portfolio.reduce((s,a)=>s+a.shares*a.currentPrice,0)/price:0;
    let totalInvested=usePort?portfolio.reduce((s,a)=>s+a.totalCost,0):0;
    let divAccum=0;
    const data=[];

    for(let m=0;m<=months;m++){
      const val=shares*price;
      const monthDiv=val*(annualYield/12);
      divAccum+=monthDiv;
      if(m>0){shares+=(monthly+monthDiv)/price;totalInvested+=monthly;}
      const step=Math.max(1,Math.floor(months/24));
      if(m%step===0||m===months){
        const yr=Math.floor(m/12),mo=m%12;
        data.push({m,label:m===0?"Зараз":mo===0?`${yr}р`:`${m}м`,value:Math.round(shares*price),invested:Math.round(totalInvested),dividends:Math.round(divAccum)});
      }
      price*=(1+mGrowth);
    }
    const last=data[data.length-1];
    setResult({data,finalValue:last.value,totalInvested:last.invested,totalDivs:last.dividends,profit:last.value-last.invested});
  };

  const milestones=result?result.data.filter((_,i,arr)=>{const s=Math.max(1,Math.floor(arr.length/7));return i%s===0||i===arr.length-1;}):[];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0f0f0",padding:16,display:"flex",flexDirection:"column",gap:12}}>
        <p style={{fontWeight:500,fontSize:14}}>Параметри прогнозу</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <FInput label="Щомісячні інвестиції ($)" value={cfg.monthly} onChange={set("monthly")} type="number"/>
          <FInput label="Горизонт (місяців)" value={cfg.months} onChange={set("months")} type="number"/>
        </div>
        <FInput label="Річне зростання ціни активу (%)" value={cfg.growth} onChange={set("growth")} type="number"/>
        {portfolio.length>0&&(
          <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#6b7280",cursor:"pointer"}}>
            <input type="checkbox" checked={cfg.usePortfolio} onChange={e=>set("usePortfolio")(e.target.checked)}/>
            Враховувати поточний портфель
          </label>
        )}
        {(!cfg.usePortfolio||!portfolio.length)&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <FInput label="Початкова ціна ($)" value={cfg.customPrice} onChange={set("customPrice")} type="number"/>
            <FInput label="Дивіденди (%/рік)" value={cfg.customYield} onChange={set("customYield")} type="number"/>
          </div>
        )}
        <button onClick={compute} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:12,padding:"11px 0",fontSize:13,fontWeight:500}}>
          Розрахувати прогноз →
        </button>
      </div>

      {result&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <Card><div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>Кінцева вартість</div><div style={{fontSize:16,fontWeight:700}}>{fmtUSD(result.finalValue)}</div></Card>
            <Card><div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>Інвестовано</div><div style={{fontSize:16,fontWeight:700}}>{fmtUSD(result.totalInvested)}</div></Card>
            <Card><div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>Дивіденди</div><div style={{fontSize:16,fontWeight:700,color:"#16a34a"}}>{fmtUSD(result.totalDivs)}</div></Card>
          </div>

          <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0f0f0",padding:16}}>
            <div style={{fontSize:11,color:"#9ca3af",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Прибуток від реінвестування</div>
            <div style={{fontSize:26,fontWeight:700,color:"#3b82f6",marginBottom:16}}>{fmtUSD(result.profit)}</div>
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={result.data} margin={{top:5,right:5,bottom:0,left:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6"/>
                <XAxis dataKey="label" tick={{fontSize:10,fill:"#9ca3af"}} interval="preserveStartEnd"/>
                <YAxis tick={{fontSize:10,fill:"#9ca3af"}} tickFormatter={v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`} width={45}/>
                <Tooltip formatter={(v,n)=>[fmtUSD(v,0),n==="value"?"Вартість":n==="invested"?"Вкладено":""]} contentStyle={{fontSize:12,borderRadius:8,border:"1px solid #e5e7eb"}}/>
                <Legend iconType="line" wrapperStyle={{fontSize:11}} formatter={v=>v==="value"?"Вартість":v==="invested"?"Вкладено":v}/>
                <Line type="monotone" dataKey="value" stroke="#3b82f6" strokeWidth={2.5} dot={false} name="value"/>
                <Line type="monotone" dataKey="invested" stroke="#d1d5db" strokeWidth={1.5} dot={false} strokeDasharray="5 3" name="invested"/>
              </LineChart>
            </ResponsiveContainer>
          </div>

          <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0f0f0",overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid #f9fafb"}}>
              <span style={{fontSize:11,color:"#9ca3af",textTransform:"uppercase",letterSpacing:1}}>Ключові точки</span>
            </div>
            {milestones.map((d,i)=>(
              <div key={i} style={{padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f9fafb"}}>
                <span style={{fontSize:13,color:"#6b7280",width:36}}>{d.label}</span>
                <span style={{fontSize:13,fontWeight:600}}>{fmtUSD(d.value,0)}</span>
                <span style={{fontSize:11,color:"#3b82f6"}}>+{fmtUSD(d.value-d.invested,0)}</span>
                <span style={{fontSize:11,color:"#16a34a"}}>{fmtUSD(d.dividends,0)} дів.</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const inputStyle={width:"100%",border:"1px solid #e5e7eb",borderRadius:12,padding:"8px 12px",marginTop:4,fontSize:14};
function Card({children}){return<div style={{background:"#fff",borderRadius:16,border:"1px solid #f0f0f0",padding:"12px 14px"}}>{children}</div>}
function Label({children}){return<div style={{fontSize:11,color:"#6b7280"}}>{children}</div>}
function FInput({label,value,onChange,type="text",placeholder=""}){
  return(
    <div>
      <Label>{label}</Label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={inputStyle}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
